name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Enable Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn typecheck

      - run: yarn test

      - run: yarn build
