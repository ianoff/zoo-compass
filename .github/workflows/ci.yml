name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn typecheck

      - run: yarn test

      - run: yarn build
