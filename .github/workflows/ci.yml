name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn typecheck

      - run: yarn test

      - run: yarn build
